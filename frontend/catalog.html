<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .page {
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #1f2937;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 0;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-title {
      font-size: 20px;
      font-weight: bold;
      padding: 0 20px 12px 20px;
    }

    .menu-item {
      padding: 12px 20px;
      cursor: pointer;
    }

    .menu-item:hover,
    .menu-item.active {
      background: #374151;
    }

    .sidebar-bottom {
      padding: 0 20px;
      font-size: 14px;
      color: #d1d5db;
    }

    .content {
      flex: 1;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin: 0;
    }

    .subtitle {
      color: #666;
      margin-top: 6px;
    }

    .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-dark {
      background: #1f2937;
      color: white;
    }

    .btn-dark:hover {
      background: #111827;
    }

    .search-box {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 22px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
    }

    .search-grid input {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    .feedback {
      margin-top: 12px;
      min-height: 20px;
      font-size: 14px;
      color: #b91c1c;
    }

    .results {
      display: grid;
      gap: 16px;
    }

    .book-card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .book-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .book-meta {
      font-size: 14px;
      color: #555;
      margin: 4px 0;
    }

    .book-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-hold {
      background: #2563eb;
      color: white;
    }

    .btn-hold:hover {
      background: #1d4ed8;
    }

    .btn-disabled {
      background: #9ca3af;
      color: white;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .search-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        width: 180px;
      }
    }

    @media (max-width: 700px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="menu-title">Menu</div>
        <div class="menu-item active" id="catalogLink">Catalog</div>
        <div class="menu-item" id="loansLink">Current Loans</div>
        <div class="menu-item" id="dashboardLink">Dashboard</div>
      </div>

      <div class="sidebar-bottom">
        <div id="patronLabel">Patron</div>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <h1 class="title">Library Catalog</h1>
          <div class="subtitle" id="welcomeMsg">Search available books and place holds.</div>
        </div>

        <button class="btn btn-dark" id="signOutBtn">Sign Out</button>
      </div>

      <section class="search-box">
        <div class="search-grid">
          <input type="text" id="titleInput" placeholder="Search by title" />
          <input type="text" id="authorInput" placeholder="Search by author" />
          <button class="btn btn-dark" id="searchBtn">Search</button>
          <button class="btn" id="clearBtn">Clear</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </section>

      <section class="results" id="results"></section>
    </main>
  </div>

  <script>
    function guard() {
      const auth = sessionStorage.getItem("patronAuth");
      if (auth !== "true") {
        window.location.replace("PatronSigninMenu.html");
      }
    }
    guard();

    const name = sessionStorage.getItem("patronName") || "Patron";
    document.getElementById("patronLabel").textContent = name;
    document.getElementById("welcomeMsg").textContent =
      `Logged in as ${name}. Search available books and place holds.`;

    const sampleBooks = [
      {
        id: 1,
        title: "Harry Potter and the Sorcerer's Stone",
        author: "J. K. Rowling",
        isbn: "9780590353427",
        available: 2
      },
      {
        id: 2,
        title: "To Kill a Mockingbird",
        author: "Harper Lee",
        isbn: "9780060935467",
        available: 0
      },
      {
        id: 3,
        title: "The Great Gatsby",
        author: "F. Scott Fitzgerald",
        isbn: "9780743273565",
        available: 2
      },
      {
        id: 4,
        title: "The Hobbit",
        author: "J. R. R. Tolkien",
        isbn: "9780547928227",
        available: 4
      },
      {
        id: 5,
        title: "1984",
        author: "George Orwell",
        isbn: "9780451524935",
        available: 2
      }
    ];

    const resultsEl = document.getElementById("results");
    const feedbackEl = document.getElementById("feedback");
    const titleInput = document.getElementById("titleInput");
    const authorInput = document.getElementById("authorInput");

    function setFeedback(msg, isError = true) {
      feedbackEl.textContent = msg;
      feedbackEl.style.color = isError ? "#b91c1c" : "#166534";
    }

    function renderBooks(books) {
      resultsEl.innerHTML = "";

      if (!books.length) {
        resultsEl.innerHTML = `
          <div class="book-card">
            <div class="book-title">No books found</div>
            <div class="book-meta">Try a different title or author search.</div>
          </div>
        `;
        return;
      }

      books.forEach((book) => {
        const card = document.createElement("div");
        card.className = "book-card";

        const availabilityText =
          book.available > 0
            ? `${book.available} available`
            : "Currently unavailable";

        const buttonHtml =
          book.available > 0
            ? `<button class="btn btn-disabled" disabled>Available Now</button>`
            : `<button class="btn btn-hold" data-book-id="${book.id}" data-book-title="${book.title}">Place Hold</button>`;

        card.innerHTML = `
          <div class="book-title">${book.title}</div>
          <div class="book-meta"><strong>Author:</strong> ${book.author}</div>
          <div class="book-meta"><strong>ISBN:</strong> ${book.isbn}</div>
          <div class="book-meta"><strong>Status:</strong> ${availabilityText}</div>
          <div class="book-actions">
            ${buttonHtml}
          </div>
        `;

        resultsEl.appendChild(card);
      });

      document.querySelectorAll(".btn-hold").forEach((btn) => {
        btn.addEventListener("click", () => {
          const title = btn.getAttribute("data-book-title");
          setFeedback(`Hold placed for "${title}" (demo mode).`, false);
        });
      });
    }

    function runSearch() {
      const titleQuery = titleInput.value.trim().toLowerCase();
      const authorQuery = authorInput.value.trim().toLowerCase();

      const filtered = sampleBooks.filter((book) => {
        const titleMatch = !titleQuery || book.title.toLowerCase().includes(titleQuery);
        const authorMatch = !authorQuery || book.author.toLowerCase().includes(authorQuery);
        return titleMatch && authorMatch;
      });

      setFeedback("");
      renderBooks(filtered);
    }

    document.getElementById("searchBtn").addEventListener("click", runSearch);

    document.getElementById("clearBtn").addEventListener("click", () => {
      titleInput.value = "";
      authorInput.value = "";
      setFeedback("");
      renderBooks(sampleBooks);
    });

    document.getElementById("catalogLink").addEventListener("click", () => {
      window.location.href = "catalog.html";
    });

    document.getElementById("loansLink").addEventListener("click", () => {
      window.location.href = "current-loans.html";
    });

    document.getElementById("dashboardLink").addEventListener("click", () => {
      window.location.href = "patron-dashboard.html";
    });

    document.getElementById("signOutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("patronAuth");
      sessionStorage.removeItem("patronName");
      window.location.href = "PatronSigninMenu.html";
    });

    titleInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });

    authorInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });

    renderBooks(sampleBooks);
  </script>
</body>
</html>
