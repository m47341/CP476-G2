<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check In</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body class="menu-open">
  <div class="page">
    <div class="screen">
      <section class="menu-view">

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-top">
            <div class="menu-title">Admin</div>
            <div class="menu-item link-item" id="dashboardLink">Dashboard</div>
            <div class="menu-item link-item" id="catalogLink">Catalog</div>
            <div class="menu-item link-item active" id="checkInLink">Check In</div>
            <div class="menu-item link-item" id="checkOutLink">Check Out</div>
            <div class="menu-item link-item" id="newPatronLink">New Patron</div>
            <div class="menu-item link-item" id="updatePatronLink">Update Patron</div>
          </div>
          <div class="sidebar-bottom">
            <div class="radio"></div>
            <div id="adminLabel">Admin</div>
          </div>
        </aside>

        <!-- Main content -->
        <main class="content">
          <div class="content-inner">
            <div class="content-title">Check In</div>

            <div class="admin-form">
              <div class="form-section-label">Returned Book</div>

              <div class="form-row">
                <label for="patronName">Patron Name</label>
                <input id="patronName" type="text" autocomplete="off" placeholder="Full name on record" />
              </div>

              <div class="form-row">
                <label for="bookId">Book Code</label>
                <input id="bookId" type="text" autocomplete="off" placeholder="Book ID" />
              </div>

              <div class="btn-row">
                <button class="btn" id="clearBtn" type="button">Clear</button>
                <button class="btn btn-primary" id="submitBtn" type="button">Check In</button>
              </div>

              <div class="feedback" id="feedback" aria-live="polite"></div>
            </div>
          </div>
        </main>

        <div class="bottom-center-btn" id="signOutBtn" title="Sign out" style="cursor:pointer;"></div>
      </section>
    </div>
  </div>

  <script>
    // ── Auth guard (admin only) ──────────────────────────────
    (function guard() {
      if (sessionStorage.getItem('adminAuth') !== 'true') {
        window.location.replace('admin_patron_signin.html');
      }
    })();

    const adminName = sessionStorage.getItem('adminName') || 'Admin';
    document.getElementById('adminLabel').textContent = adminName;

    // ── Nav ──────────────────────────────────────────────────
    document.getElementById('dashboardLink').addEventListener('click', () => {
      window.location.href = 'admin.html';
    });
    document.getElementById('catalogLink').addEventListener('click', () => {
      window.location.href = 'catalog.html';
    });
    document.getElementById('checkOutLink').addEventListener('click', () => {
      window.location.href = 'check-out.html';
    });
    document.getElementById('newPatronLink').addEventListener('click', () => {
      window.location.href = 'new-patron.html';
    });
    document.getElementById('updatePatronLink').addEventListener('click', () => {
      window.location.href = 'update-patron.html';
    });

    // ── Sign out ─────────────────────────────────────────────
    document.getElementById('signOutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('adminAuth');
      sessionStorage.removeItem('adminName');
      window.location.href = 'admin_patron_signin.html';
    });

    // ── Form elements ────────────────────────────────────────
    const patronInput = document.getElementById('patronName');
    const bookInput    = document.getElementById('bookId');
    const submitBtn    = document.getElementById('submitBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const feedback     = document.getElementById('feedback');

    function setFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className   = 'feedback' + (type ? ` ${type}` : '');
    }

    function clearForm() {
      patronInput.value = '';
      bookInput.value    = '';
      setFeedback('', 'dim');
      patronInput.focus();
    }

    clearBtn.addEventListener('click', clearForm);

    async function submitCheckIn() {
      setFeedback('', '');

      const patron = patronInput.value.trim();
      const bookId = bookInput.value.trim();

      if (!patron || !bookId) {
        setFeedback('Patron name and book code are both required.');
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Saving…';

      try {
        const res = await fetch('http://localhost:3060/admin/check-in', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ Patron_Name: patron, Book_ID: bookId })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          setFeedback(data.message || 'Book checked in successfully.', 'ok');
          clearForm();
        } else {
          setFeedback(data.error || 'Check-in failed. Please verify the patron and book code.');
        }
      } catch (err) {
        setFeedback('Unable to reach server. Please try again.');
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Check In';
      }
    }

    submitBtn.addEventListener('click', submitCheckIn);

    [patronInput, bookInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') submitCheckIn(); });
    });
  </script>
</body>
</html>
