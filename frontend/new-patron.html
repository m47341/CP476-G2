<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Patron</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body class="menu-open">
  <div class="page">
    <div class="screen">
      <section class="menu-view">

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-top">
            <div class="menu-title">Admin</div>
            <div class="menu-item link-item" id="dashboardLink">Dashboard</div>
            <div class="menu-item link-item" id="catalogLink">Catalog</div>
            <div class="menu-item link-item" id="checkInLink">Check In</div>
            <div class="menu-item link-item" id="checkOutLink">Check Out</div>
            <div class="menu-item link-item active" id="newPatronLink">New Patron</div>
            <div class="menu-item link-item" id="updatePatronLink">Update Patron</div>
          </div>
          <div class="sidebar-bottom">
            <div class="radio"></div>
            <div id="adminLabel">Admin</div>
          </div>
        </aside>

        <!-- Main content -->
        <main class="content">
          <div class="content-inner">
            <div class="content-title">New Patron</div>

            <div class="admin-form">
              <div class="form-section-label">Patron Details</div>

              <div class="form-row">
                <label for="patronName">Name</label>
                <input id="patronName" type="text" autocomplete="off" placeholder="Full name" />
              </div>

              <div class="form-row">
                <label for="patronEmail">Email</label>
                <input id="patronEmail" type="email" autocomplete="off" placeholder="email@example.com" />
              </div>

              <div class="form-row">
                <label for="patronPassword">Password</label>
                <input id="patronPassword" type="password" autocomplete="off" placeholder="Temporary password" />
              </div>

              <div class="form-row">
                <label for="patronPasswordConfirm">Confirm</label>
                <input id="patronPasswordConfirm" type="password" autocomplete="off" placeholder="Re-enter password" />
              </div>

              <div class="btn-row">
                <button class="btn" id="clearBtn" type="button">Clear</button>
                <button class="btn btn-primary" id="submitBtn" type="button">Create Patron</button>
              </div>

              <div class="feedback" id="feedback" aria-live="polite"></div>
            </div>
          </div>
        </main>

        <div class="bottom-center-btn" id="signOutBtn" title="Sign out" style="cursor:pointer;"></div>
      </section>
    </div>
  </div>

  <script>
    // ── Auth guard (admin only) ──────────────────────────────
    (function guard() {
      if (sessionStorage.getItem('adminAuth') !== 'true') {
        window.location.replace('admin_patron_signin.html');
      }
    })();

    const adminName = sessionStorage.getItem('adminName') || 'Admin';
    document.getElementById('adminLabel').textContent = adminName;

    // ── Nav ──────────────────────────────────────────────────
    document.getElementById('dashboardLink').addEventListener('click', () => {
      window.location.href = 'admin.html';
    });
    document.getElementById('catalogLink').addEventListener('click', () => {
      window.location.href = 'catalog.html';
    });
    document.getElementById('checkInLink').addEventListener('click', () => {
      window.location.href = 'check-in.html';
    });
    document.getElementById('checkOutLink').addEventListener('click', () => {
      window.location.href = 'check-out.html';
    });
    document.getElementById('updatePatronLink').addEventListener('click', () => {
      window.location.href = 'update-patron.html';
    });

    // ── Sign out ─────────────────────────────────────────────
    document.getElementById('signOutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('adminAuth');
      sessionStorage.removeItem('adminName');
      window.location.href = 'admin_patron_signin.html';
    });

    // ── Form logic ───────────────────────────────────────────
    const nameInput     = document.getElementById('patronName');
    const emailInput    = document.getElementById('patronEmail');
    const pwInput       = document.getElementById('patronPassword');
    const pwConfInput   = document.getElementById('patronPasswordConfirm');
    const submitBtn     = document.getElementById('submitBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const feedback      = document.getElementById('feedback');

    function setFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className   = 'feedback' + (type ? ` ${type}` : '');
    }

    function clearForm() {
      nameInput.value   = '';
      emailInput.value  = '';
      pwInput.value     = '';
      pwConfInput.value = '';
      setFeedback('', 'dim');
      nameInput.focus();
    }

    clearBtn.addEventListener('click', clearForm);

    async function submitNewPatron() {
      setFeedback('', '');

      const name     = nameInput.value.trim();
      const email    = emailInput.value.trim();
      const password = pwInput.value;
      const confirm  = pwConfInput.value;

      // Client-side validation
      if (!name || !email || !password || !confirm) {
        setFeedback('All fields are required.'); return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFeedback('Please enter a valid email address.'); return;
      }
      if (password !== confirm) {
        setFeedback('Passwords do not match.'); return;
      }
      if (password.length < 6) {
        setFeedback('Password must be at least 6 characters.'); return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Creating…';

      try {
        const res = await fetch('http://localhost:3060/admin/create-new-patron', {
          method:  'GET',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            Patron_Name:     name,
            Patron_Email:    email,
            Patron_Password: password
          })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          setFeedback(`Patron "${name}" created successfully.`, 'ok');
          clearForm();
        } else {
          setFeedback(data.error || 'Failed to create patron. Please try again.');
        }
      } catch (err) {
        setFeedback('Unable to reach server. Please try again.');
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Create Patron';
      }
    }

    submitBtn.addEventListener('click', submitNewPatron);

    // Allow Enter key to submit from any field
    [nameInput, emailInput, pwInput, pwConfInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') submitNewPatron(); });
    });
  </script>
</body>
</html>
