<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-styles.css" />

  <style>
    /* Borrow dashboard quick-links grid CSS for book result display */
    .admin-form {
      padding: 18px;
      margin-bottom: 22px;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      max-width: 720px;
    }

    .book-card {
      border: 1px solid #ccc;
      padding: 18px 16px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      background: #fff;
    }

    .book-card:hover {
      background: #f0f0f0;
    }

    .book-card .book-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .book-card .book-detail {
      color: #777;
      margin-bottom: 3px;
    }

    .book-card .btn {
      margin-top: 10px;
    }
  </style>
</head>

<body class="menu-open">
  <div class="page">
    <div class="screen">
      <section class="menu-view">

        <aside class="sidebar">
          <div class="sidebar-top">
            <div class="menu-title">Admin</div>

            <div class="menu-item link-item" id="dashboardLink">
              Dashboard
            </div>

            <div class="menu-item link-item active" id="catalogLink">
              Catalog
            </div>

            <div class="menu-item link-item" id="addBookLink">
              Add Book
            </div>

            <div class="menu-item link-item" id="checkInLink">
              Check In
            </div>

            <div class="menu-item link-item" id="checkOutLink">
              Check Out
            </div>

            <div class="menu-item link-item" id="newPatronLink">
              New Patron
            </div>

            <div class="menu-item link-item" id="updatePatronLink">
              Update Patron
            </div>
          </div>

          <div class="sidebar-bottom">
            <div class="radio"></div>
            <div id="adminLabel">Admin</div>
          </div>
        </aside>

        <main class="content">
          <div class="content-inner">

            <div class="content-title">Catalog</div>

            <div class="admin-form">
              <div class="form-section-label">
                Search available books and place holds.
              </div>

              <div class="form-row">
                <input
                  type="text"
                  id="titleInput"
                  placeholder="Search by title"
                />
              </div>

              <div class="form-row">
                <input
                  type="text"
                  id="authorInput"
                  placeholder="Search by author"
                />
              </div>

              <div class="btn-row">
                <button type="button" class="btn" id="clearBtn">
                  Clear
                </button>

                <button
                  type="button"
                  class="btn btn-primary"
                  id="searchBtn"
                >
                  Search
                </button>
              </div>
            </div>

            <div class="feedback" id="feedback"></div>

            <section class="results books" id="results"></section>
          </div>
        </main>

        <div
          class="bottom-center-btn"
          id="signOutBtn"
          title="Sign out"
          style="cursor: pointer;"
        ></div>

      </section>
    </div>
  </div>

  <script>
    // Prevent non-admin users from accessing this page directly.
    (function guard() {
      if (sessionStorage.getItem("adminAuth") !== "true") {
        window.location.replace("admin_patron_signin.html");
      }
    })();

    // Display the signed-in administrator's name.
    const adminName =
      sessionStorage.getItem("adminName") || "Admin";

    document.getElementById("adminLabel").textContent = adminName;

    // Stores books returned from the backend database search.
    let dbBooks = [];

    // DOM references.
    const resultsEl = document.getElementById("results");
    const feedbackEl = document.getElementById("feedback");
    const titleInput = document.getElementById("titleInput");
    const authorInput = document.getElementById("authorInput");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");

    /**
     * Displays a feedback message to the user.
     *
     * @param {string} message Message to display.
     * @param {boolean} isError Whether the message is an error.
     */
    function setFeedback(message, isError = true) {
      feedbackEl.textContent = message;
      feedbackEl.style.color = isError ? "#b91c1c" : "#166534";
    }

    /**
     * Escapes text before inserting database values into HTML.
     *
     * @param {*} value Value to escape.
     * @returns {string} Safe HTML text.
     */
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /**
     * Displays book cards in the results section.
     *
     * @param {Array} books Books to display.
     */
    function renderBooks(books) {
      resultsEl.innerHTML = "";

      if (!books.length) {
        resultsEl.innerHTML = `
          <div class="book-card">
            <div class="book-title">No books found</div>
            <div class="book-detail">
              Try a different title or author search.
            </div>
          </div>
        `;

        return;
      }

      books.forEach((book) => {
        const card = document.createElement("div");
        card.className = "book-card";

        const availableCopies = Number(book.available) || 0;

        const availabilityText =
          availableCopies > 0
            ? `${availableCopies} available`
            : "Currently unavailable";

        const buttonHtml =
          availableCopies > 0
            ? `
              <button
                type="button"
                class="btn btn-disabled"
                disabled
              >
                Available Now
              </button>
            `
            : `
              <button
                type="button"
                class="btn btn-hold"
                data-book-id="${escapeHtml(book.id)}"
                data-book-title="${escapeHtml(book.title)}"
              >
                Place Hold
              </button>
            `;

        card.innerHTML = `
          <div class="book-title">
            ${escapeHtml(book.title)}
          </div>

          <div class="book-detail">
            <strong>Author:</strong>
            ${escapeHtml(book.author)}
          </div>

          <div class="book-detail">
            <strong>ISBN:</strong>
            ${escapeHtml(book.isbn)}
          </div>

          <div class="book-detail">
            <strong>Status:</strong>
            ${escapeHtml(availabilityText)}
          </div>

          <div class="book-actions">
            ${buttonHtml}
          </div>
        `;

        resultsEl.appendChild(card);
      });

      // Hold placement is currently only a frontend demonstration.
      document.querySelectorAll(".btn-hold").forEach((button) => {
        button.addEventListener("click", () => {
          const title = button.getAttribute("data-book-title");

          setFeedback(
            `Hold placed for "${title}" (demo mode).`,
            false
          );
        });
      });
    }

    /**
     * Sends the book search to the backend.
     */
    async function runSearch() {
      setFeedback("");

      const title = titleInput.value.trim();
      const author = authorInput.value.trim();

      if (!title && !author) {
        dbBooks = [];
        renderBooks(dbBooks);

        setFeedback(
          "Title or author is required to search."
        );

        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "Searching…";

      try {
        const response = await fetch(
          "http://localhost:3060/admin/search",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              Title: title,
              Author_Name: author
            })
          }
        );

        let data;

        try {
          data = await response.json();
        } catch (parseError) {
          throw new Error(
            "The server returned an invalid response."
          );
        }

        if (!response.ok || !data.success) {
          dbBooks = [];
          renderBooks(dbBooks);

          setFeedback(
            data.error ||
            data.message ||
            "Search failed."
          );

          return;
        }

        /*
         * The backend returns capitalized SQL field names.
         * Convert them into the lowercase names expected by renderBooks().
         */
        dbBooks = Array.isArray(data.books)
          ? data.books.map((book) => ({
              id: book.ID,
              title: book.Title,
              author: book.Author_Name,
              isbn: book.ISBN,
              available: book.Copies_Available
            }))
          : [];

        renderBooks(dbBooks);

        if (dbBooks.length > 0) {
          setFeedback(
            `${dbBooks.length} book(s) found.`,
            false
          );
        } else {
          setFeedback(
            "No matching books were found."
          );
        }
      } catch (error) {
        console.error("Book search error:", error);

        dbBooks = [];
        renderBooks(dbBooks);

        setFeedback(
          "Unable to reach the server. Make sure the backend is running on port 3060."
        );
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "Search";
      }
    }

    // Run the database search when the Search button is clicked.
    searchBtn.addEventListener("click", runSearch);

    // Clear the search fields and previous results.
    clearBtn.addEventListener("click", () => {
      titleInput.value = "";
      authorInput.value = "";
      dbBooks = [];

      setFeedback("");
      resultsEl.innerHTML = "";

      titleInput.focus();
    });

    // Allow searches by pressing Enter in either input.
    titleInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runSearch();
      }
    });

    authorInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runSearch();
      }
    });

    // Navigation.
    document
      .getElementById("dashboardLink")
      .addEventListener("click", () => {
        window.location.href = "admin.html";
      });

    document
      .getElementById("catalogLink")
      .addEventListener("click", () => {
        window.location.href = "admin-catalog.html";
      });

    document
      .getElementById("addBookLink")
      .addEventListener("click", () => {
        window.location.href = "add-book.html";
      });

    document
      .getElementById("checkInLink")
      .addEventListener("click", () => {
        window.location.href = "check-in.html";
      });

    document
      .getElementById("checkOutLink")
      .addEventListener("click", () => {
        window.location.href = "check-out.html";
      });

    document
      .getElementById("newPatronLink")
      .addEventListener("click", () => {
        window.location.href = "new-patron.html";
      });

    document
      .getElementById("updatePatronLink")
      .addEventListener("click", () => {
        window.location.href = "update-patron.html";
      });

    // Sign out and return to the login page.
    document
      .getElementById("signOutBtn")
      .addEventListener("click", () => {
        sessionStorage.removeItem("adminAuth");
        sessionStorage.removeItem("adminName");

        window.location.href =
          "admin_patron_signin.html";
      });
  </script>
</body>
</html>
