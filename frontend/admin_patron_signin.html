<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>

  <!-- Reuse the shared project styles, then apply only login-specific rules. -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin_patron_signin.css" />
</head>
<body>
  <div class="page">
    <div class="screen">
      <section class="login-view">
        <h1 class="title">Admin Login</h1>

        <form id="adminLoginForm" class="login-box" novalidate>
          <div class="field">
            <label for="emailInput">Email:</label>
            <input
              id="emailInput"
              name="adminEmail"
              type="email"
              autocomplete="username"
              placeholder="admin@library.org"
              required
            />
          </div>

          <div class="field">
            <label for="passwordInput">Password:</label>
            <input
              id="passwordInput"
              name="adminPassword"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="login-actions">
            <button id="backBtn" type="button">Back</button>
            <button id="loginBtn" type="submit">Sign In</button>
          </div>

          <div id="errorMsg" class="error-msg" aria-live="polite"></div>
        </form>
      </section>
    </div>
  </div>

  <script src="admin_patron_signin.js"></script>
</body>
</html>
